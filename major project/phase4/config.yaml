# Phase 4: Malicious URL Detection — Enhanced Training Data
# Same architecture as Phase 3 (Char CNN-BiGRU-Attention + Brand-Aware MLP)
# Key change: merged training dataset (Kaggle + PhishTank + synthetic)

# Data paths
data:
  # Use merged dataset from data_pipeline instead of raw Kaggle
  dataset_path: "data_pipeline/processed/merged_dataset.csv"
  # For fallback/debug, raw Kaggle: "../../../datasets/malicious_phish.csv"
  artifacts_dir: "artifacts"
  results_dir: "artifacts/results"
  model_path: "artifacts/model.keras"
  scaler_path: "artifacts/scaler.pkl"
  tokenizer_path: "artifacts/tokenizer.json"

# Data splitting
split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

# Branch A: Character-level sequence processing
branch_a:
  embedding_dim: 32
  cnn_filters: 128
  cnn_kernel_size: 3
  gru_units: 64

# Branch B: Lexical heuristic features (27 = 23 baseline + 4 brand)
branch_b:
  input_features: 27
  dense_units_1: 64
  dense_units_2: 32
  dropout: 0.3

# Classification head
head:
  dense_units: 128
  dropout: 0.5
  num_classes: 4

# Training hyperparameters
training:
  learning_rate: 0.001
  batch_size: 256
  epochs: 50
  early_stopping_patience: 5
  reduce_lr_patience: 3
  reduce_lr_factor: 0.5

# Reproducibility
random_seed: 42
